plugins {
id 'java'
id 'application'
}

repositories {
mavenCentral()
}

dependencies {
implementation 'com.google.code.gson:gson:2.11.0'
}

application {
mainClass = 'app.SkiTracker'
}

sourceSets {
	main {
		java {
			srcDirs = ['.']
			include 'app/**/*.java', 'model/**/*.java', 'ui/**/*.java', 'util/**/*.java'
		}
	}
}

tasks.named('run') {
    standardInput = System.in
}