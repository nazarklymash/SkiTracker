plugins {
id 'java'
id 'application'
}

repositories {
mavenCentral()
}

dependencies {
implementation 'com.google.code.gson:gson:2.11.0'
}

application {
mainClass = 'app.SkiTracker'
}

sourceSets {
    main {
        java {
            srcDirs = ['app', 'model', 'ui', 'util', 'service']
        }
    }
}

tasks.named('run') {
    standardInput = System.in
}